version: '3.8'

services:
  # 🌐 ส่วนที่ 1: ตู้เว็บเซิร์ฟเวอร์ (PHP + Apache)
  web:
    image: php:8.1-apache
    container_name: helpdesk-web
    ports:
      - "80:80" # เปิดให้เครื่องอื่นเข้าผ่าน IP ได้เลย
    volumes:
      - ./:/var/www/html/ 
    # 🌟 เพิ่ม 2 บรรทัดนี้เข้าไปครับ เพื่อติดตั้ง PDO MySQL Driver
    command: sh -c "docker-php-ext-install pdo pdo_mysql && apache2-foreground"
    networks:
      - helpdesk-net

  # 🗄️ ส่วนที่ 2: ตู้ฐานข้อมูล (MySQL)
  db:
    image: mysql:8.0
    container_name: helpdesk-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword # รหัสผ่าน root
      MYSQL_DATABASE: hospital_helpdesk1      # ชื่อฐานข้อมูล
    ports:
      - "3306:3306"
    networks:
      - helpdesk-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: helpdesk-pma
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1
    networks:
      - helpdesk-net

networks:
  helpdesk-net: