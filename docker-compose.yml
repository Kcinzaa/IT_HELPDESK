version: '3.8'

services:
  # 🌐 ส่วนที่ 1: ตู้เว็บเซิร์ฟเวอร์ (PHP + Apache)
  web:
    image: php:8.1-apache
    container_name: helpdesk-web
    ports:
      - "80:80" # เปิดให้เครื่องอื่นเข้าผ่าน IP ได้เลย
    volumes:
      - ./:/var/www/html/ # เชื่อมโค้ดในเครื่องเราเข้าตู้
    networks:
      - helpdesk-net

  # 🗄️ ส่วนที่ 2: ตู้ฐานข้อมูล (MySQL)
  db:
    image: mysql:8.0
    container_name: helpdesk-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword # รหัสผ่าน root
      MYSQL_DATABASE: helpdesk_db      # ชื่อฐานข้อมูล
    ports:
      - "3306:3306"
    networks:
      - helpdesk-net

  # 🛠️ ส่วนที่ 3: ตัวจัดการฐานข้อมูล (เหมือน phpMyAdmin ใน XAMPP)
  phpmyadmin:
    image: phpmyadmin
    container_name: helpdesk-pma
    restart: always
    ports:
      - "8080:80" # เข้าจัดการ DB ผ่านพอร์ต 8080
    environment:
      - PMA_ARBITRARY=1
    networks:
      - helpdesk-net

networks:
  helpdesk-net: