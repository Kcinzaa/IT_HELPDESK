version: '3.8'

services:
  # 🌐 ส่วนที่ 1: ตู้เว็บเซิร์ฟเวอร์ (PHP + Apache)
  web:
    build: .
    container_name: helpdesk-web
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html/
    networks:
      - helpdesk-net

  # 🗄️ ส่วนที่ 2: ตู้ฐานข้อมูล (MySQL)
  db:
    image: mysql:8.0
    container_name: helpdesk-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: helpdesk_db
    # 🌟 DevOps Upgrade: ระบบตรวจสุขภาพตู้ DB
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
    networks:
      - helpdesk-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: helpdesk-pma
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1
    networks:
      - helpdesk-net

networks:
  helpdesk-net: